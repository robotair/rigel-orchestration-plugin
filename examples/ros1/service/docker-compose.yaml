# ROS1 Service (Client/Server) - local testing with docker-compose.
# Server provides add_two_ints; client calls it every second with random numbers.
#
# NOTE: ROS1 logs go to ~/.ros/log/ inside containers, not stdout.
# To view logs:
#   docker exec ros1_service_server bash -c 'cat ~/.ros/log/add_two_ints_server.log'
#   docker exec ros1_service_client bash -c 'cat ~/.ros/log/add_two_ints_client.log'
#
# Usage:
#   docker compose up --build
#   docker compose down

services:
  roscore:
    image: ros:noetic-ros-core
    container_name: ros1_service_roscore
    command: roscore
    networks:
      - ros-net

  server:
    build:
      context: ./server
    container_name: ros1_service_server
    depends_on:
      - roscore
    environment:
      - ROS_MASTER_URI=http://roscore:11311
      - ROS_HOSTNAME=server
    networks:
      - ros-net

  client:
    build:
      context: ./client
    container_name: ros1_service_client
    depends_on:
      - roscore
      - server
    environment:
      - ROS_MASTER_URI=http://roscore:11311
      - ROS_HOSTNAME=client
    networks:
      - ros-net

networks:
  ros-net:
    driver: bridge
